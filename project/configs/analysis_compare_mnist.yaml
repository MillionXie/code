dataset: mnist

analysis:
  num_samples: 1000
  fixed_indices: [0, 1, 2, 3, 4]
  noise_sigmas: [0.0, 0.05, 0.1, 0.2, 0.3]
  interp_steps: 9
  interp_noise_sigma: 0.02
  tsne_perplexity: 30
  batch_size: 256
  num_workers: 4
  seed: 42
  save_pdf: true
  include_optical_intensity: false
  optical_vis:
    use_log1p: true
    cmap: magma
  electronic_vis:
    topk_channels: 4

checkpoints:
  electronic: ./outputs/map_elec_mnist/checkpoints/best.pt
  optical: ./outputs/map_opt_mnist/checkpoints/best.pt
