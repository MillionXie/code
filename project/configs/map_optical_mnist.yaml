dataset: mnist

data:
  out_range: zero_one
  image_size: [64, 64]

model:
  arch: pure_optical
  latent_channels: 1
  latent_hw: [10, 10]
  # The following conv settings are ignored when arch=pure_optical (kept for compatibility).
  encoder_channels: [32, 64]
  decoder_channels: [256, 128, 64, 32]
  decoder_mode: deconv
  # full-res optional combo:
  # decoder_mode: conv_refine

train:
  epochs: 50
  batch_size: 128
  lr: 0.001
  seed: 42
  num_workers: 4
  recon_loss: auto

loss:
  alpha: 1.0
  beta: 1.0
  gamma: 0.1
  # sigma of q(w|x)=N(mu_w, sigma^2 I), fixed (not learned)
  posterior_sigma: 0.050
  prior:
    type: biased_gaussian
    mu0: 0.1  #0.25
    sigma: 0.050 #0.010
    apply_smooth_in_train: false
    apply_smooth_in_sample: false
    spatial_smooth:
      type: none
      sigma_px: 1.5
  optical_penalty:
    mode: tv
  kl_w:
    # KL is applied on optical latent mean mu_w (after scattering+detect+pool).
    target: latent_mean
    var_mode: constant
    # If omitted, var0 defaults to posterior_sigma^2.
    # var0: 0.01
    m0: 0.1 #0.25
    prior_sigma0: 0.050 # 0.10
    pre_norm: none
    clamp_nonnegative: true

optics:
  field_init_mode: real
  # Two diffractive phase layers are simulated on a 200x200 grid (8um pitch).
  resize_hw: [200, 200]
  # NOTE: pad/unpad is handled only inside angular_spectrum_propagate.
  wavelength_nm: 532.0
  pixel_pitch_um: 8.0
  diffractive_layers:
    z_mm: [20.0, 20.0]
    trainable: true
    init: uniform
  z_to_scatter_mm: 20.0
  z_to_sensor_mm: 5.0
  posterior_sigma: 0.10
  decoder:
    field_init_mode: sqrt_positive
    resize_hw: [200, 200]
    # 10x10 latent -> 200x200 field by block repeat (physically consistent inverse mapping).
    latent_to_field_mode: repeat
    layer_z_mm: [20.0, 20.0, 20.0, 20.0]
    z_to_sensor_mm: 20.0
    trainable: true
    init: uniform
  pad_factor: 1.0
  bandlimit: true
  upsample_factor: 1
  scatter:
    type: correlated_phase #iid_phase #iid_phase  
    static: true
    phase_sigma: 1.0
    corr_len_px: 50.0
  sensor:
    # No ROI crop / no extra interpolation: intensity -> pooling -> latent.
    pool_type: avg # none #
    # If you want no pooling, set pool_type: none and make latent_hw == resize_hw.
    # 200x200 field -> 10x10 latent in one step.
    pool_kernel: 20
    pool_stride: 20
    # mean: block average; sum: block integral (ablation).
    pool_reduce: mean

sample:
  n_samples: 64
  grid_size: 8
