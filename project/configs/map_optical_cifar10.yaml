dataset: cifar10

data:
  out_range: zero_one
  image_size: [64, 64]

model:
  latent_channels: 1
  latent_hw: [10, 10]
  # Encoder: 2 conv blocks
  encoder_channels: [64, 128]
  # Decoder: 4 conv-transpose blocks
  decoder_channels: [384, 256, 128, 64]
  decoder_mode: deconv

train:
  epochs: 50
  batch_size: 128
  lr: 0.001
  seed: 42
  num_workers: 4
  recon_loss: auto

loss:
  alpha: 1.0
  beta: 1.0
  gamma: 0.1
  # sigma of q(w|x)=N(mu_w, sigma^2 I), fixed (not learned)
  posterior_sigma: 0.10
  prior:
    type: biased_gaussian
    mu0: 0.3
    sigma: 1.0
    apply_smooth_in_train: false
    spatial_smooth:
      type: gaussian
      sigma_px: 1.5
  optical_penalty:
    mode: tv
  kl_w:
    # KL is applied on optical latent mean mu_w (after scattering+detect+pool).
    target: latent_mean
    var_mode: constant
    # If omitted, var0 defaults to posterior_sigma^2.
    # var0: 0.01
    m0: 1.0
    prior_sigma0: 1.0
    pre_norm: mean
    clamp_nonnegative: true

optics:
  field_init_mode: real
  # Two diffractive phase layers are simulated on a 200x200 grid (8um pitch).
  resize_hw: [200, 200]
  # NOTE: pad/unpad is handled only inside angular_spectrum_propagate.
  wavelength_nm: 532.0
  pixel_pitch_um: 8.0
  diffractive_layers:
    z_mm: [30.0, 30.0]
    trainable: true
    init: uniform
  z_to_scatter_mm: 30.0
  z_to_sensor_mm: 1.0
  posterior_sigma: 0.10
  pad_factor: 2.0
  bandlimit: true
  upsample_factor: 1
  scatter:
    type: angle_limited
    static: true
    na: 0.25
  sensor:
    # No ROI crop / no extra interpolation: intensity -> pooling -> latent.
    pool_type: avg
    # If you want no pooling, set pool_type: none and make latent_hw == resize_hw.
    # 200x200 field -> 10x10 latent in one step.
    pool_kernel: 20
    pool_stride: 20
    # mean: block average; sum: block integral (ablation).
    pool_reduce: mean

sample:
  n_samples: 64
  grid_size: 8
