dataset: cifar10

data:
  out_range: zero_one
  image_size: [64, 64]

model:
  latent_channels: 1
  latent_hw: [10, 10]
  # Encoder: 2 conv blocks
  encoder_channels: [64, 128]
  # Decoder: 4 conv-transpose blocks
  decoder_channels: [384, 256, 128, 64]
  decoder_mode: deconv

train:
  epochs: 50
  batch_size: 128
  lr: 0.001
  seed: 42
  num_workers: 4
  recon_loss: auto

loss:
  alpha: 1.0
  beta: 1.0
  gamma: 0.1
  prior:
    type: biased_gaussian
    mu0: 0.3
    sigma: 1.0
    apply_smooth_in_train: false
    spatial_smooth:
      type: gaussian
      sigma_px: 1.5
  optical_penalty:
    mode: tv
  kl_w:
    # KL target space:
    # - final_latent: decoder input (recommended for sampling consistency)
    # - latent_intensity: optical intensity w
    target: final_latent
    var_mode: constant
    var0: 1.0
    # With pre_norm=mean, m0=1.0 is a natural centered choice.
    m0: 1.0
    prior_sigma0: 1.0
    pre_norm: mean
    clamp_nonnegative: true

optics:
  field_init_mode: real
  resize_hw: [80, 80]
  # NOTE: pad/unpad is handled only inside angular_spectrum_propagate.
  wavelength_nm: 532.0
  pixel_pitch_um: 8.0
  z1_mm: 30.0
  z2_mm: 30.0
  pad_factor: 2.0
  bandlimit: true
  upsample_factor: 1
  scatter:
    type: angle_limited
    static: true
    na: 0.25
  sensor:
    # No ROI crop / no extra interpolation: intensity -> pooling -> latent.
    pool_type: avg
    # If you want no pooling, set pool_type: none and make latent_hw == resize_hw.
    # 80x80 field -> 10x10 latent in one step.
    pool_kernel: 8
    pool_stride: 8
    # mean: block average; sum: block integral (ablation).
    pool_reduce: mean

sample:
  n_samples: 64
  grid_size: 8
