dataset: cifar10

data:
  out_range: zero_one
  image_size: [64, 64]

model:
  latent_channels: 24
  latent_hw: [4, 4]
  # Encoder: 2 conv blocks
  encoder_channels: [64, 128]
  # Decoder: 4 conv-transpose blocks
  decoder_channels: [384, 256, 128, 64]
  decoder_mode: deconv

train:
  epochs: 50
  batch_size: 128
  lr: 0.001
  seed: 42
  num_workers: 4
  recon_loss: auto

loss:
  alpha: 1.0
  beta: 1.0
  gamma: 0.1
  prior:
    type: biased_gaussian
    mu0: 0.3
    sigma: 1.0
    apply_smooth_in_train: false
    spatial_smooth:
      type: gaussian
      sigma_px: 1.5
  optical_penalty:
    mode: tv
  kl_w:
    # KL target space:
    # - final_latent: decoder input (recommended for sampling consistency)
    # - latent_intensity: optical intensity w
    target: final_latent
    var_mode: constant
    var0: 1.0
    # For sensor.normalize=mean, final_latent has sample mean near 1.0.
    m0: 1.0
    prior_sigma0: 1.0
    pre_norm: none
    clamp_nonnegative: true

optics:
  field_init_mode: real
  direct_mode: latent_hw
  resize_hw: [64, 64]
  # NOTE: pad/unpad is handled only inside angular_spectrum_propagate.
  wavelength_nm: 532.0
  pixel_pitch_um: 8.0
  z1_mm: 30.0
  z2_mm: 30.0
  pad_factor: 2.0
  bandlimit: true
  upsample_factor: 1
  # Keep decoder input non-negative for physical latent semantics.
  output_center: false
  scatter:
    type: angle_limited
    static: true
    na: 0.25
  sensor:
    # roi_hw is optional extra FOV crop (NOT pad/unpad). Keep null by default.
    roi_hw: null
    pool_type: avg
    # Microlens-array style one-shot block aggregation: 64 -> 4 uses kernel=stride=16.
    pool_kernel: 16
    pool_stride: 16
    # mean: block average; sum: block integral (ablation).
    pool_reduce: mean
    # out_hw is optional digital resize post-processing; keep null by default.
    out_hw: null
    full_res_source: roi_intensity
    normalize: mean
    noise_model: none
    poisson_scale: 1.0
    read_noise_std: 0.0

viz:
  optics_show: simple

sample:
  n_samples: 64
  grid_size: 8
